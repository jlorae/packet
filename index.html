<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Packet">
<meta name="theme-color" content="#FF6A45">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Daily Packet</title>
<style>

/* Bright summer theme (Jessica, 2026-07-14): light, lively — coral + sea green +
   sunshine. Committed LIGHT: forced even when the phone is in dark mode. */
:root, :root[data-theme="light"], :root[data-theme="dark"]{
  --card:#FFFFFF; --ink:#2B4F48; --muted:#86A69B;
  --line:#F1E7D6; --sand:#FBEFD5;
  --accent:#FF6A45; --accent-ink:#fff;
  --sea:#12B9A6; --sea-ink:#fff;
  --sun:#FFC531;
  --alert:#F04A28; --alert-bg:#FFEAE2;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:#FEF3E6;}
.wrap{max-width:640px;margin:0 auto;padding:18px 14px 44px;min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--ink);-webkit-text-size-adjust:100%;
  background:linear-gradient(168deg,#FFF4E2 0%,#FFECEC 42%,#E7FAF3 100%);
  background-attachment:fixed;}
.head{position:sticky;top:0;z-index:5;margin:-18px -14px 16px;padding:16px 16px 14px;
  background:linear-gradient(168deg,#FFF4E2,#FFF0EA);
  border-bottom:2px solid #FFE0C7;border-radius:0 0 20px 20px;
  box-shadow:0 4px 14px rgba(255,150,90,.10);}
.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;
  color:var(--accent);}
.head h1{font-size:24px;margin:3px 0 12px;font-weight:800;letter-spacing:-.01em;color:var(--ink);}
.bar{height:11px;background:#FBEBD3;border-radius:99px;overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.05);}
.bar>i{display:block;height:100%;width:0;transition:width .3s ease;border-radius:99px;
  background:linear-gradient(90deg,#FF6A45,#FFC531 55%,#12B9A6);}
.count{font-size:13px;color:var(--muted);margin-top:7px;font-weight:600;}
.sec{font-size:15px;letter-spacing:-.01em;text-transform:none;color:var(--ink);
  font-weight:800;margin:22px 4px 10px;display:flex;align-items:center;gap:9px;}
.sec:before{content:"";width:20px;height:4px;border-radius:2px;background:var(--sun);flex:0 0 auto;}
/* ── Tab bar: 5 situational tabs, horizontally scrollable, pinned under the header ── */
.tabs{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 2px 4px;margin:0 0 6px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;border:1.5px solid #F0DFC4;background:#fff;color:var(--ink);
  font-size:14px;font-weight:800;letter-spacing:-.01em;padding:9px 14px;border-radius:99px;
  cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:7px;transition:.15s;}
.tab .n{display:inline-block;min-width:20px;text-align:center;font-size:12px;font-weight:800;
  background:#FBEBD3;color:var(--muted);border-radius:99px;padding:1px 6px;}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 3px 10px rgba(255,106,69,.30);}
.tab.active .n{background:rgba(255,255,255,.28);color:#fff;}
.tab.empty{opacity:.45;}
.card{display:flex;gap:12px;background:var(--card);border:1px solid #F4EAD9;
  border-radius:18px;padding:15px;margin-bottom:12px;
  box-shadow:0 3px 12px rgba(120,150,140,.10);}
.card.alert{border-color:#FFC9B6;background:var(--alert-bg);}
.card.is-done{display:none;}
.list.show-done .card.is-done{display:flex;opacity:.5;}
.card.is-done .draft,.card.is-done .copy{display:none;}
.done{flex:0 0 auto;padding-top:2px;cursor:pointer;}
.done input{position:absolute;opacity:0;width:30px;height:30px;}
.done span{display:block;width:28px;height:28px;border:2.5px solid #E7D8BF;
  border-radius:9px;transition:.15s;position:relative;background:#fff;}
.done input:checked+span{background:var(--sea);border-color:var(--sea);
  box-shadow:0 2px 8px rgba(18,185,166,.35);}
.done input:checked+span:after{content:"";position:absolute;left:9px;top:4px;
  width:6px;height:12px;border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg);}
.body{flex:1;min-width:0;}
.badge{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.05em;
  padding:3px 9px;border-radius:99px;margin-bottom:6px;}
.b-msg{background:#D2F4EE;color:#0B7A6D} .b-text{background:#FFEFC2;color:#98700E}
.b-email{background:#EAE7D3;color:#6C6942} .b-post{background:#FFE0D6;color:#C74523}
.b-task{background:#F2EAD9;color:#7E7050}
.nm{font-weight:700;font-size:16px;line-height:1.3;}
.typ{font-weight:500;color:var(--muted);font-size:14px;}
.ctx{font-size:12.5px;color:var(--muted);margin:4px 0 0;font-style:italic;}
.draft{white-space:pre-wrap;word-wrap:break-word;background:#FFFBF3;
  border:1px dashed #F0DFC4;border-radius:12px;padding:12px;margin:11px 0 0;
  font-size:15px;line-height:1.5;color:#3A4E48;}
.copy{margin-top:11px;width:100%;min-height:48px;border:0;border-radius:12px;
  background:var(--accent);color:var(--accent-ink);font-size:15px;font-weight:800;
  cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent;
  box-shadow:0 3px 10px rgba(255,106,69,.30);}
.copy:active{transform:scale(.98);}
.copy.ok{background:var(--sea);box-shadow:0 3px 10px rgba(18,185,166,.35);}
.list{display:flex;flex-direction:column;}
.card{transition:opacity .2s ease;}
.donebar{display:none;text-align:center;margin:18px 0 4px;}
.donebar button{border:1px solid #CDE9E3;background:#EAF8F4;color:var(--sea);
  font-size:12px;font-weight:800;letter-spacing:.04em;padding:9px 16px;border-radius:99px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;}
.donebar .reset{display:block;margin:10px auto 0;border:0;background:none;color:var(--muted);
  font-size:11px;text-decoration:underline;cursor:pointer;}
.stale{background:var(--alert-bg);color:var(--alert);border:1px solid #FFC9B6;
  border-radius:12px;padding:10px 14px;margin:0 0 12px;font-size:13px;font-weight:700;text-align:center;}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;line-height:1.5;}

/* passphrase gate */
.gate{max-width:420px;margin:16vh auto 0;padding:0 22px;text-align:center;}
.gate .flower{font-size:52px;margin-bottom:6px;}
.gate h1{font-size:22px;color:var(--ink);margin:6px 0 4px;}
.gate p{color:var(--muted);font-size:14px;margin:0 0 20px;}
.gate input{width:100%;min-height:52px;border:2px solid #F1E7D6;border-radius:14px;
  padding:0 16px;font-size:17px;background:#fff;color:var(--ink);margin-bottom:12px;}
.gate input:focus{outline:none;border-color:var(--accent);}
.gate button{width:100%;min-height:52px;border:0;border-radius:14px;background:var(--accent);
  color:#fff;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(255,106,69,.3);}
.gate .err{color:var(--alert);font-size:13px;font-weight:700;min-height:18px;margin-top:10px;}
.hide{display:none!important;}
</style>
</head>
<body>
<div class="wrap" id="app" style="display:none">
  <div class="head">
    <div class="eyebrow">Daily Packet</div>
    <h1 id="date">Today</h1>
    <div class="bar"><i id="fill"></i></div>
    <div class="count" id="count">0 done</div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div id="stalewrap"></div>
  <div class="list" id="list"></div>
  <div class="donebar" id="donebar">
    <button id="donetoggle" onclick="toggleDone()"></button>
    <button class="reset" onclick="resetDay()">Start today over</button>
  </div>
  <div class="foot">Tap Copy to grab a draft, then paste into Messenger.<br>Done items tuck away so only what's left shows. Saved on this phone.</div>
</div>

<div class="gate" id="gate">
  <div class="flower">🌸</div>
  <h1>Your Daily Packet</h1>
  <p>Enter your passphrase to unlock today's packet.</p>
  <input id="pass" type="password" inputmode="text" autocomplete="current-password"
         placeholder="Passphrase" enterkeyhint="go">
  <button onclick="unlock()">Unlock</button>
  <div class="err" id="err"></div>
</div>

const ITERS = 250000;
let DRAFTS = {}, KEY = "packet", list = null, kids = [], CAT = null, CATS = [];

/* ---------- crypto (interoperates with the Python build) ---------- */
async function decryptBlob(pass, b64){
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = raw.slice(0,16), iv = raw.slice(16,28), data = raw.slice(28);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
              {name:"PBKDF2"}, false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
              {name:"PBKDF2", salt, iterations:ITERS, hash:"SHA-256"},
              km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, data);
  return new TextDecoder().decode(pt);
}

async function unlock(){
  const pass = document.getElementById("pass").value.trim();
  const err = document.getElementById("err");
  if(!pass){ err.textContent = "Type your passphrase."; return; }
  err.textContent = "Unlocking…";
  try{
    const json = await decryptBlob(pass, BLOB);
    localStorage.setItem("pp", pass);          // remember on THIS device (type once)
    render(JSON.parse(json));
    document.getElementById("gate").classList.add("hide");
    document.getElementById("app").style.display = "";
  }catch(e){ err.textContent = "That passphrase didn't work. Try again."; }
}

/* ---------- packet render (identical behavior to the Artifact) ---------- */
function render(p){
  DRAFTS = p.drafts || {};
  KEY = "packet-" + p.date_str;
  document.getElementById("date").textContent = p.date_str;
  document.getElementById("stalewrap").innerHTML = p.stale_banner || "";
  list = document.getElementById("list");
  list.innerHTML = p.cards || "";
  kids = Array.prototype.slice.call(list.children);
  var s = state();
  document.querySelectorAll(".done input").forEach(function(cb){
    if(s[cb.dataset.id]){ cb.checked = true; cb.closest(".card").classList.add("is-done"); }
  });
  buildTabs(p.cats || []);
  refresh();
}
/* ---------- tabs (Jessica 2026-07-15): click-through by situation ---------- */
function buildTabs(cats){
  CATS = cats;
  var bar = document.getElementById("tabs");
  if(!cats.length){ bar.style.display = "none"; CAT = null; reflow(); return; }
  bar.style.display = "";
  bar.innerHTML = cats.map(function(c){
    return '<button class="tab" data-cat="' + c.key + '" onclick="selectTab(\'' + c.key + '\')">'
      + c.label + ' <span class="n" data-cat="' + c.key + '">' + c.count + '</span></button>';
  }).join("");
  selectTab(cats[0].key);
}
function selectTab(cat){
  CAT = cat;
  Array.prototype.slice.call(document.querySelectorAll("#tabs .tab")).forEach(function(t){
    t.classList.toggle("active", t.dataset.cat === cat);
  });
  list.classList.remove("show-done");   // fresh view each time you switch tabs
  reflow();
  window.scrollTo(0, 0);
}
function tabBoxes(){   // done-checkboxes belonging to the active tab
  return Array.prototype.slice.call(document.querySelectorAll(".card")).filter(function(c){
    return CAT === null || c.getAttribute("data-cat") === CAT;
  }).map(function(c){ return c.querySelector(".done input"); }).filter(Boolean);
}
function updateTabCounts(){
  (CATS || []).forEach(function(c){
    var open = Array.prototype.slice.call(document.querySelectorAll('.card[data-cat="' + c.key + '"]'))
      .filter(function(el){ var cb = el.querySelector(".done input"); return cb && !cb.checked; }).length;
    var badge = document.querySelector('#tabs .n[data-cat="' + c.key + '"]');
    if(badge) badge.textContent = open;
    var tab = document.querySelector('#tabs .tab[data-cat="' + c.key + '"]');
    if(tab) tab.classList.toggle("empty", open === 0);
  });
}
function state(){ try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}} }
function save(s){ try{localStorage.setItem(KEY, JSON.stringify(s))}catch(e){} }
function doCopy(t,cb){ if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(cb,function(){fb(t,cb)});} else fb(t,cb); }
function fb(t,cb){ var a=document.createElement("textarea");a.value=t;a.style.position="fixed";
  a.style.opacity="0";document.body.appendChild(a);a.focus();a.select();
  try{document.execCommand("copy")}catch(e){}document.body.removeChild(a);cb(); }
function copyDraft(btn){ doCopy(DRAFTS[btn.dataset.id]||"", function(){
  btn.classList.add("ok");var o=btn.textContent;btn.textContent="Copied!";
  setTimeout(function(){btn.classList.remove("ok");btn.textContent=o},1400); }); }
function reflow(){
  var showDone = list.classList.contains("show-done");
  // 1) cards: show only those in the active tab, minus done (unless the drawer is open)
  kids.forEach(function(el){
    if(!el.classList.contains("card")) return;
    var inTab = (CAT === null) || (el.getAttribute("data-cat") === CAT);
    var done = el.classList.contains("is-done");
    el.style.display = (inTab && (showDone || !done)) ? "flex" : "none";
  });
  // 2) section headers: visible only if in-tab AND at least one card under it is visible
  for(var i=0;i<kids.length;i++){
    if(!kids[i].classList.contains("sec")) continue;
    var inTab = (CAT === null) || (kids[i].getAttribute("data-cat") === CAT);
    var anyVis = false;
    for(var j=i+1;j<kids.length && !kids[j].classList.contains("sec");j++){
      if(kids[j].classList.contains("card") && kids[j].style.display !== "none"){ anyVis = true; break; }
    }
    kids[i].style.display = (inTab && anyVis) ? "flex" : "none";
  }
  // 3) done drawer + tab counts (scoped to the active tab)
  var boxes = tabBoxes();
  var done = boxes.filter(function(b){ return b.checked; }).length;
  document.getElementById("donebar").style.display = done ? "block" : "none";
  document.getElementById("donetoggle").textContent = (showDone ? "Hide " : "Show ") + done + " done in this tab";
  updateTabCounts();
}
function toggle(cb){ var s=state();s[cb.dataset.id]=cb.checked;save(s);
  cb.closest(".card").classList.toggle("is-done",cb.checked); refresh(); reflow(); }
function toggleDone(){ list.classList.toggle("show-done"); reflow(); }
function resetDay(){ if(!confirm("Clear today's checkmarks and start fresh?")) return;
  save({}); list.classList.remove("show-done");
  document.querySelectorAll(".done input").forEach(function(cb){
    cb.checked=false; cb.closest(".card").classList.remove("is-done"); });
  refresh(); reflow(); window.scrollTo(0,0); }
function refresh(){
  var boxes=Array.prototype.slice.call(document.querySelectorAll(".done input"));
  var done=boxes.filter(function(b){return b.checked}).length;
  document.getElementById("count").textContent=done+" of "+boxes.length+" done";
  document.getElementById("fill").style.width=(boxes.length?done/boxes.length*100:0)+"%";
}
document.getElementById("pass").addEventListener("keydown",function(e){ if(e.key==="Enter") unlock(); });

/* auto-unlock if this device already knows the passphrase */
(function(){ var pp=localStorage.getItem("pp");
  if(pp){ document.getElementById("pass").value=pp; unlock(); } })();

if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(function(){}); }
</script>
